name: fc_app3_sockslite_pro
description: "Sockslite Pro — connection dashboard and local session UI (configure disclosure URLs for App Store)."
publish_to: "none"

version: 1.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.3
  share_plus: ^13.1.0
  url_launcher: ^6.3.2
  app_settings: ^7.0.0
  package_info_plus: ^10.1.0
  http: ^1.3.0
  multiads:
    path: ./packages/multiads

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_native_splash:
  color: "#007BFF"
  ios: true
  android: true
  android_12:
    color: "#007BFF"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  remove_alpha_ios: true
  adaptive_icon_background: "#007BFF"
  adaptive_icon_foreground: assets/app_icon.png
